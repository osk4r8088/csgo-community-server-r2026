// ============================================================================
//  CS:GO — 1v1 Arena Config (128 Tick)
// ============================================================================
// Executed via: ./start.sh arena
// Plugin required: splewis/csgo-multi-1v1
// Maps required: am_* arena maps (standard maps do NOT work)
//
// Deploy to: /srv/csgo-host/csgo/cfg/arena.cfg
// ============================================================================

// ── 128-Tick Rates ──────────────────────────────────────────────────────────
sv_mincmdrate 128
sv_maxcmdrate 128
sv_minupdaterate 128
sv_maxupdaterate 128
sv_minrate 128000
sv_maxrate 0
sv_clockcorrection_msecs 15

// ── Round Structure ─────────────────────────────────────────────────────────
// The multi-1v1 plugin manages most round logic
mp_roundtime 0.25
mp_freezetime 1
mp_buytime 0
mp_maxrounds 0
mp_round_restart_delay 1
mp_match_restart_delay 3
mp_timelimit 0

// ── No halftime / overtime ──────────────────────────────────────────────────
mp_halftime 0
mp_overtime_enable 0

// ── Team Balance ────────────────────────────────────────────────────────────
// Plugin handles team assignment per arena
mp_autoteambalance 0
mp_limitteams 0

// ── Gameplay ────────────────────────────────────────────────────────────────
mp_friendlyfire 0
mp_free_armor 1
mp_death_drop_grenade 0
mp_death_drop_gun 0
mp_death_drop_defuser 0
mp_defuser_allocation 0
mp_weapons_allow_map_placed 0

// ── Economy (disabled) ──────────────────────────────────────────────────────
mp_startmoney 0
mp_playercashawards 0
mp_teamcashawards 0

// ── Warmup ──────────────────────────────────────────────────────────────────
mp_warmup_pausetimer 1
mp_endwarmup_player_count 2
mp_warmuptime 60

// ── Respawn ─────────────────────────────────────────────────────────────────
mp_respawn_on_death_ct 0
mp_respawn_on_death_t 0

// ── Anti-Cheat ──────────────────────────────────────────────────────────────
sv_cheats 0
sv_pure 1

// ── Communication ───────────────────────────────────────────────────────────
sv_alltalk 0
sv_deadtalk 1
sv_full_alltalk 0

// ── Misc ────────────────────────────────────────────────────────────────────
sv_allow_votes 0
mp_display_kill_assists 1
sv_kick_ban_duration 0
spec_freeze_time 1
mp_win_panel_display_time 1
bot_quota 0
