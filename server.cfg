// ospw CS:GO Server Config

// ── Identity ──
hostname "*yourname* csgo"

// ── Rates (128 tick) ──
// Requires -tickrate 128 in start.sh launch parameters
sv_mincmdrate 128
sv_maxcmdrate 128
sv_minupdaterate 128
sv_maxupdaterate 128
sv_minrate 128000
sv_maxrate 0

// ── Anti-cheat ──
sv_cheats 0
sv_pure 1

// ── Competitive settings are in gamemode_competitive_server.cfg ──
// That file is auto-executed on every map change in competitive mode
// and prevents Valve defaults from overriding our settings.

// ── Logging (for future stats dashboard) ──
log on
sv_logbans 1
sv_logecho 1
sv_logfile 1
sv_log_onefile 0
mp_logdetail 3
mp_logmoney 1

// ── Network ──
sv_lan 0

// ── RankMe settings ──
// Auto-generated at cfg/sourcemod/kento.rankme.cfg on first run
// Key overrides:
// rankme_minimumplayers 2
// rankme_gather_stats_warmup 0
// rankme_points_start 1000
